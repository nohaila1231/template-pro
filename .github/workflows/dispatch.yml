name: '🚀 Lancer CI sur TOUTES les apps'

on:
  workflow_dispatch:
    inputs:
      node-version:
        description: 'Version Node.js'
        required: true
        default: '18'
        type: choice
        options:
          - '16'
          - '18'
          - '20'
          - '22'
          - '24'
      run-tests:
        description: 'Exécuter les tests'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  # Job pour chaque application
  test-app-1-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app-1-auth
        uses: actions/checkout@v4
        with:
          repository: nohaila1231/app-1-auth
          token: ${{ secrets.PAT_TOKEN }}
          ref: main
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Tests
        if: ${{ inputs.run-tests == 'true' }}
        run: npm test
      
      - name: Build
        run: npm run build

