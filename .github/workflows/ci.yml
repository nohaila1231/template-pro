name: 'CI Pipeline'

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Version Node.js'
        required: false
        type: string
        default: '18'
      run-tests:
        description: 'Exécuter les tests'
        required: false
        type: boolean
        default: true
      target-repo:
        type: string
        required: true
    secrets:
      token:
        required: true

jobs:
  ci:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{inputs.target-repo}} 
       
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      
      - name: Cache npm
        uses: actions/cache@v3
        id: cache
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Tests
        if: ${{ inputs.run-tests == true }}
        run: npm test
      
      - name: Build
        run: npm run build
      
      - name: Résultat
        run: |
          echo "========================================="
          echo "✅ Pipeline terminé"
          echo "📦 Node.js: ${{ inputs.node-version }}"
          echo "🧪 Tests: ${{ inputs.run-tests }}"
          echo "💾 Cache: ${{ steps.cache.outputs.cache-hit == 'true' && 'RESTAURÉ' || 'CRÉÉ' }}"
          echo "========================================="
